name: Hata Bildirimi
description: Bir hata veya sorun bildirin
title: "[Hata]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Hata bildirimi için teşekkürler! Lütfen aşağıdaki bilgileri doldurun.
  - type: dropdown
    id: skill
    attributes:
      label: İlgili Skill
      description: Hangi skill ile ilgili?
      options:
        - saas-launcher
        - saas-auth
        - saas-payments
        - saas-email
        - saas-landing-seo
        - saas-api-security
        - saas-deployment
        - CLI (tezgah komutu)
        - Genel
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Sorun Açıklaması
      description: Ne oldu? Ne olmasını bekliyordun?
      placeholder: |
        Beklenen davranış: ...
        Gerçekleşen davranış: ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Tekrar Etme Adımları
      description: Sorunu tekrar etmek için adımlar
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: textarea
    id: context
    attributes:
      label: Ek Bilgi
      description: Tech stack, Node.js sürümü, işletim sistemi vb.
